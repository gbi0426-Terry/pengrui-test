<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI貸款資格審查系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow">

<h2 class="text-2xl font-bold mb-6">🤖 AI貸款資格審查系統</h2>

<!-- 個人資料 -->
<h3 class="font-semibold mb-2">👤 個人資訊</h3>

<input id="age" placeholder="年齡" class="w-full border p-2 rounded mb-3">
<input id="income" placeholder="月收入" class="w-full border p-2 rounded mb-3">

<select id="debt" class="w-full border p-2 rounded mb-4">
  <option value="0">無負債</option>
  <option value="1">有負債</option>
</select>

<button onclick="checkLoan()" 
class="w-full bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700">
🚀 AI立即評估
</button>

<!-- 結果 -->
<div id="resultBox" class="mt-6 hidden p-4 rounded-xl"></div>

</div>

<script>
function checkLoan() {
  let age = Number(document.getElementById("age").value);
  let income = Number(document.getElementById("income").value);
  let debt = Number(document.getElementById("debt").value);

  let resultBox = document.getElementById("resultBox");

  resultBox.classList.remove("hidden");

  if (age > 20 && income > 30000 && debt === 0) {
    resultBox.className = "mt-6 p-4 rounded-xl bg-green-100 text-green-700";
    resultBox.innerHTML = "🟢 <b>核貸機率高</b><br>建議可直接申請貸款";
  } 
  else if (income > 20000) {
    resultBox.className = "mt-6 p-4 rounded-xl bg-yellow-100 text-yellow-700";
    resultBox.innerHTML = "🟡 <b>需進一步評估</b><br>建議補充財力證明";
  } 
  else {
    resultBox.className = "mt-6 p-4 rounded-xl bg-red-100 text-red-700";
    resultBox.innerHTML = "🔴 <b>風險較高</b><br>建議改善收入或降低負債";
  }
}
</script>

</body>
</html>
