<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>貸款AI評估系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-xl font-bold mb-6 text-center">📊 貸款AI評估系統</h2>

    <label class="block mb-1">年齡</label>
    <input id="age" class="w-full border p-2 rounded mb-4">

    <label class="block mb-1">月收入</label>
    <input id="income" class="w-full border p-2 rounded mb-4">

    <label class="block mb-1">是否有負債</label>
    <select id="debt" class="w-full border p-2 rounded mb-4">
      <option value="0">無</option>
      <option value="1">有</option>
    </select>

    <button onclick="checkLoan()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
      AI判定
    </button>

    <h3 id="result" class="mt-4 text-center font-bold text-lg"></h3>

  </div>

  <script>
    function checkLoan() {
      let age = document.getElementById("age").value;
      let income = document.getElementById("income").value;
      let debt = document.getElementById("debt").value;

      if (age > 20 && income > 30000 && debt == 0) {
        document.getElementById("result").innerHTML = "🟢 可貸";
      } else if (income > 20000) {
        document.getElementById("result").innerHTML = "🟡 需評估";
      } else {
        document.getElementById("result").innerHTML = "🔴 高風險";
      }
    }
  </script>

</body>
</html>
